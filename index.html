<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tae Yeong Beauty — Nail Art Design Hoboken NJ</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Tae Yeong Beauty offers the best nail art design and gel manicures in Hoboken, NJ. Custom designs, luxury pedicures, and seasonal looks by talented nail artists.">
<meta name="keywords" content="nail art, nail salon, Hoboken NJ, gel manicure, pedicure, nail artist">

<link rel="icon" href="./img/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@700&display=swap" rel="stylesheet">

<style>

html { box-sizing:border-box; }
*,*:before,*:after { box-sizing:inherit; }

body{
margin:0;
background:#fff;
font-family:'PT Serif',serif;
color:#231b18;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
padding:1.3rem 4vw 1rem;
border-bottom:1.5px solid #ececec;
}

.header-left,.header-right{flex:1}

.header-center{text-align:center}

.header-logo-img{
height:54px;
max-width:240px;
}

.gallery-link{
text-decoration:none;
font-weight:600;
letter-spacing:.04em;
padding:7px 24px;
border-radius:22px;
}

.gallery-link:hover{
background:#fae9f5;
}

.insta-icon{
height:34px;
width:34px;
}

/* MAIN */

.container{
max-width:1120px;
margin:auto;
padding:3.3em 4vw;
display:flex;
gap:3vw;
align-items:center;
}

.left-col{flex:1}

.right-col{
flex:1;
display:flex;
justify-content:center;
}

.headline{
font-size:2.3rem;
margin-bottom:.7em;
}

.desc{
font-size:1.13rem;
line-height:1.7;
color:#423d39;
}

.main-image{
width:98%;
max-width:420px;
border-radius:18px;
box-shadow:0 8px 42px #dbb6b728;
border:1px solid #f3e6ef;
aspect-ratio:5/6;
object-fit:cover;
opacity:1;
transition:opacity .8s ease;
}

/* GALLERY */

.gallery-wrap{
display:none;
padding:3vw;
max-width:1200px;
margin:auto;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:1.5em;
}

.gallery-grid img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
border-radius:15px;
cursor:pointer;
transition:transform .15s;
}

.gallery-grid img:hover{
transform:scale(1.03);
}

/* LIGHTBOX */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
opacity:0;
transition:opacity .4s ease;
}

.lightbox.show{
opacity:1;
}

.lightbox img{
max-width:90vw;
max-height:85vh;
border-radius:10px;
}

.lightbox-close{
position:absolute;
top:20px;
right:30px;
font-size:2rem;
color:#fff;
cursor:pointer;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="header-left">
<a class="gallery-link" href="#" onclick="showGallery();return false;">Gallery</a>
</div>

<div class="header-center">
<img src="./img/logo.jpg" class="header-logo-img">
</div>

<div class="header-right" style="text-align:right">
<a href="https://instagram.com/taeyeongbeauty" target="_blank">
<img src="./img/inst.png" class="insta-icon">
</a>
</div>

</div>

<!-- MAIN -->

<div class="container" id="main-content">

<div class="left-col">

<div class="headline">
Tae Yeong Nails like no other
</div>

<div class="desc">
Experience the art of detail with our nail designs, where only the finest materials meet a relentless pursuit of perfection in every finish.
</div>

</div>

<div class="right-col">
<img id="rotating-img" class="main-image">
</div>

</div>

<!-- GALLERY -->

<div class="gallery-wrap" id="gallery-wrap">

<div style="text-align:right;margin-bottom:2rem">
<a href="#" onclick="showMain()">Home</a>
</div>

<div class="gallery-grid" id="gallery-grid"></div>

</div>

<!-- LIGHTBOX -->

<div class="lightbox" id="lightbox">
<span class="lightbox-close" onclick="closeLightbox()">×</span>
<img id="lightbox-img">
</div>

<script>

const img=document.getElementById("rotating-img");
const galleryGrid=document.getElementById("gallery-grid");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

let images=[];
let idx=0;

const maxImagesToCheck=200;

function loadImages(){

let promises=[];

for(let i=1;i<=maxImagesToCheck;i++){

let path=`./nail/nail${i}.jpg`;

promises.push(new Promise(resolve=>{

let test=new Image();

test.onload=()=>resolve({exists:true,path,num:i});
test.onerror=()=>resolve({exists:false});

test.src=path;

}));

}

Promise.all(promises).then(results=>{

images=results
.filter(r=>r.exists)
.sort((a,b)=>b.num-a.num)
.map(r=>r.path);

if(images.length===0)return;

img.src=images[0];

buildGallery();

startRotation();

});

}

function buildGallery(){

images.forEach(src=>{

let g=document.createElement("img");

g.src=src;

galleryGrid.appendChild(g);

g.addEventListener("click",()=>{

lightbox.style.display="flex";

void lightbox.offsetWidth;

lightboxImg.src=src;

lightbox.classList.add("show");

});

});

}

function startRotation(){

setInterval(()=>{

img.style.opacity=0;

setTimeout(()=>{

idx=(idx+1)%images.length;

img.src=images[idx];

img.style.opacity=1;

},400);

},2000);

}

function showGallery(){

document.getElementById("main-content").style.display="none";

document.getElementById("gallery-wrap").style.display="block";

}

function showMain(){

document.getElementById("gallery-wrap").style.display="none";

document.getElementById("main-content").style.display="flex";

}

function closeLightbox(){

lightbox.classList.remove("show");

setTimeout(()=>{

lightbox.style.display="none";

},400);

}

lightbox.addEventListener("click",e=>{
if(e.target!==lightboxImg)closeLightbox();
});

loadImages();

</script>

</body>
</html>
